<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陳氏薇 (Trần Thị Vi)</title>

    <style>
        :root {
            --linkedin-blue: #0a66c2;
            --bg-gray: #f3f2ef;
            --border-color: #e0e0e0;
            --text-main: #1d1d1d;
            --text-sub: rgba(0,0,0,0.6);
        }

        body {
            font-family: "Segoe UI", system-ui;
            margin: 0;
            background-color: var(--bg-gray);
        }

        .container {
            max-width: 1100px;
            margin: 20px auto;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            overflow: hidden;
        }

        /* ✅ Banner fix */
        .header-banner {
            height: 200px;
            background-image: url("images/banner.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .profile-section {
            padding: 0 24px 24px;
        }

        .photo-container {
            width: 150px;
            height: 150px;
            margin-top: -75px;
        }

        .profile-photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
        }

        h1 {
            margin: 10px 0 5px;
        }

        .headline {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .contact-info {
            font-size: 14px;
            color: gray;
        }

        .section {
            padding: 20px;
        }

        .tags span {
            border: 1px solid gray;
            padding: 5px 12px;
            border-radius: 15px;
            margin-right: 5px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">
        <div class="header-banner"></div>

        <div class="profile-section">
            <div class="photo-container">
                <img src="images/123.jpg" class="profile-photo">
            </div>

            <h1>陳氏薇 (Trần Thị Vi)</h1>
            <div class="headline">數位多媒體設計學生</div>
            <div class="contact-info">
                新北市 • tranthivi220909@gmail.com • 0970126327
            </div>
        </div>
    </div>

    <div class="card section">
        <h2>關於我</h2>
        <p>目前就讀於黎明技術學院數位多媒體系，對設計充滿熱情。</p>
    </div>

    <div class="card section">
        <h2>技能</h2>
        <div class="tags">
            <span>Photoshop</span>
            <span>Illustrator</span>
            <span>Video Editing</span>
        </div>
    </div>

</div>

</body>
</html>
