<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陳氏薇 (Trần Thị Vi)</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gray: #f3f2ef;
            --border-color: #e0e0e0;
            --primary-color: #0a66c2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
            color: #333;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .container {
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Banner với avatar + text bên trái */
        .header-banner {
            height: 220px;
            background-image: url("images/OIP.jpg");
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            position: relative;
        }

        .profile-left {
            display: flex;
            align-items: center;
            position: absolute;
            left: 24px;
            bottom: 20px;
        }

        .photo-container {
            width: 120px;
            height: 120px;
            margin-right: 15px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid white;
        }

        .profile-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .profile-photo:hover {
            transform: scale(1.05);
        }

        .profile-text h1 {
            margin: 0;
            color: #fff;
            font-weight: 700;
        }

        .profile-text .headline {
            font-size: 16px;
            color: #eee;
            margin-top: 4px;
        }

        .profile-section {
            padding: 15px 24px 24px;
        }

        .contact-info {
            font-size: 14px;
            color: gray;
            text-align: left;
        }

        .section {
            padding: 20px;
        }

        .tags span {
            background-color: #f0f0f0;
            border: 1px solid gray;
            padding: 5px 12px;
            border-radius: 15px;
            margin-right: 5px;
            display: inline-block;
            margin-bottom: 5px;
            font-size: 14px;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .tags span:hover {
            background-color: var(--primary-color);
            color: #fff;
            transform: scale(1.05);
            cursor: default;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-banner {
                height: 180px;
            }
            .photo-container {
                width: 100px;
                height: 100px;
            }
        }

        @media (max-width: 480px) {
            .header-banner {
                height: 150px;
            }
            .profile-left {
                flex-direction: column;
                align-items: flex-start;
                bottom: 10px;
            }
            .photo-container {
                width: 80px;
                height: 80px;
                margin-right: 0;
                margin-bottom: 8px;
            }
            .profile-text h1 {
                font-size: 16px;
            }
            .profile-text .headline {
                font-size: 14px;
            }
            .section {
                padding: 15px;
            }
            .contact-info {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Header Card -->
    <div class="card">
        <div class="header-banner">
            <div class="profile-left">
                <div class="photo-container">
                    <img src="images/OIP.jpg" class="profile-photo" alt="Profile">
                </div>
                <div class="profile-text">
                    <h1>陳氏薇 (Trần Thị Vi)</h1>
                    <div class="headline">數位多媒體設計學生</div>
                </div>
            </div>
        </div>

        <div class="profile-section">
            <div class="contact-info">
                新北市 • 
                <a href="mailto:tranthivi220909@gmail.com">tranthivi220909@gmail.com</a> • 
                <a href="tel:0970126327">0970126327</a>
            </div>
        </div>
    </div>

    <!-- About Me -->
    <div class="card section">
        <h2>關於我</h2>
        <p>
            目前就讀於黎明技術學院數位多媒體系，對數位設計與創作充滿熱情，
            持續學習並提升自己的技能。
        </p>
    </div>

    <!-- Skills -->
    <div class="card section">
        <h2>技能</h2>
        <div class="tags">
            <span>Photoshop</span>
            <span>Illustrator</span>
            <span>Video Editing</span>
            <span>After Effects</span>
            <span>Figma</span>
        </div>
    </div>

</div>

</body>
</html>
