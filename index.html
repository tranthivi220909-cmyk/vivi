<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陳氏薇 - Portfolio</title>

<style>
:root {
    --bg: #f7f6f2;
    --card: #ffffff;
    --text: #1a1a1a;
    --sub: rgba(0,0,0,0.6);
    --accent: #7c6f64;
}

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
}

/* CARD */
.card {
    background: var(--card);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 18px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

/* PROFILE */
.header {
    height: 220px;
    background-image: url("images/lo.jpg");
    background-size: cover;
    background-position: center;
    border-radius: 16px 16px 0 0;
}

.profile {
    text-align: center;
    margin-top: -70px;
}

.avatar {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid white;
    object-fit: cover;
}

h1 {
    margin: 10px 0 5px;
    font-weight: 600;
}

/* QUOTE */
.quote {
    font-style: italic;
    color: var(--accent);
    margin-top: 10px;
}

/* SOCIAL BUTTONS (UPDATED) */
.social {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 15px;
    flex-wrap: wrap;
}

.social-btn {
    text-decoration: none;
    color: var(--accent);
    border: 1px solid #d6d3ce;
    padding: 9px 16px;
    border-radius: 999px;
    font-size: 13px;
    background: #f8f7f4;
    transition: all 0.25s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

.social-btn:hover {
    background: var(--accent);
    color: white;
    transform: translateY(-3px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.12);
}

/* TITLE */
.title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--accent);
}

/* ITEM */
.item {
    font-size: 14px;
}

/* TAG */
.tag {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 12px;
    background: #f0efeb;
    margin: 3px;
    font-size: 13px;
}

</style>
</head>

<body>

<div class="container">

<!-- PROFILE -->
<div class="card">
    <div class="header"></div>

    <div class="profile">
        <img src="images/123.jpg" class="avatar">

        <h1>陳氏薇</h1>

        <p class="quote">
            我讓你看到的生活，是經過選擇與修飾的。
        </p>

        <!-- SOCIAL -->
        <div class="social">

            <a class="social-btn" href="mailto:tranthivi220909@gmail.com">
                ✉ Email
            </a>

            <a class="social-btn" href="https://facebook.com" target="_blank">
                f Facebook
            </a>

            <a class="social-btn" href="https://instagram.com" target="_blank">
                @ Instagram
            </a>

        </div>
    </div>
</div>

<!-- ABOUT -->
<div class="card">
    <div class="title">關於我</div>
    <div class="item">
        我仍在學習如何定義自己的風格。
    </div>

    <br>

    <div class="title">個性</div>

        偏向內向性格（Introvert）。<br>
        安靜、慢熱，喜歡獨處與思考。
    </div>
</div>

<!-- WORK -->
<div class="card">

    <div class="item">
        <b>GARMIN</b> ｜ 林口<br>
        2024/05 - 至今<br><br>

        ・產品組裝與品質檢查<br>
        ・確保流程效率與標準
    </div>
</div>

<!-- SKILLS -->
<div class="card">
    <div class="title">技能</div>
    <span class="tag">Photoshop</span>
    <span class="tag">Illustrator</span>
    <span class="tag">剪輯</span>

</div>

<!-- HOBBY -->
<div class="card">
    <div class="title">興趣</div>

    <span class="tag">舞蹈</span>
    <span class="tag">羽毛球</span>
    <span class="tag">踢毽子</span>
    <span class="tag">聽播客</span>
</div>

<!-- EDUCATION -->
<div class="card">
    <div class="title">學歷</div>

        黎明技術學院（LIT）<br>
        數位多媒體設計學系<br>

</div>

<!-- LANGUAGE -->

    <div class="title">語言</div>
    <div class="item">
        中文（TOCFL B1）<br>
        越南語（母語）
    </div>
</div>

</div>

</body>
</html>
