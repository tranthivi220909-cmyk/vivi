<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陳氏薇 (Trần Thị Vi) - 專業個人主頁</title>

    <style>
        :root {
            --linkedin-blue: #0a66c2;
            --bg-gray: #f3f2ef;
            --border-color: #e0e0e0;
            --text-main: #1d1d1d;
            --text-sub: rgba(0,0,0,0.6);
        }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
        }

        .container {
            max-width: 1128px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .header-banner {
            height: 180px;
            background: linear-gradient(135deg, #0a66c2 0%, #004182 100%);
        }

        .profile-section {
            padding: 0 24px 24px;
        }

        .photo-container {
            width: 152px;
            height: 152px;
            margin-top: -76px;
            margin-bottom: 15px;
        }

        .profile-photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #fff;
            object-fit: cover;
            background-color: #eee;
        }

        .info h1 {
            font-size: 24px;
            margin: 0;
        }

        .headline {
            font-size: 18px;
            margin: 5px 0;
        }

        .contact-info {
            font-size: 14px;
            color: var(--text-sub);
        }

        .section-padding {
            padding: 24px;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 16px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            border: 1px solid #666;
            padding: 5px 15px;
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">
        <div class="header-banner"></div>

        <div class="profile-section">

            <div class="photo-container">
                <!-- ✅ FIX Ở ĐÂY -->
                <img src="./images/123.jpg" alt="Profile" class="profile-photo">
            </div>

            <div class="info">
                <h1>陳氏薇 (Trần Thị Vi)</h1>
                <p class="headline">數位多媒體設計學生 | 致力於視覺傳達與數位創作</p>
                <p class="contact-info">
                    新北市, 台灣 • tranthivi220909@gmail.com • 0970126327
                </p>
            </div>

        </div>
    </div>

    <div class="card section-padding">
        <h2 class="section-title">關於我</h2>
        <p>
            目前就讀於黎明技術學院數位多媒體系，對數位藝術與多媒體內容創作充滿熱情。
            已取得 TOCFL B1，能流暢在中文環境中溝通與學習。
        </p>
    </div>

    <div class="card section-padding">
        <h2 class="section-title">專業技能</h2>
        <div class="tags">
            <span class="tag">Photoshop</span>
            <span class="tag">Illustrator</span>
            <span class="tag">Video Editing</span>
        </div>
    </div>

</div>

</body>
</html>
